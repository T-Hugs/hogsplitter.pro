# TLS: HTTP-01 via webroot (works with Porkbun or any DNS — point A/AAAA at this host).
# 1) sudo mkdir -p /var/www/certbot && sudo chown root:root /var/www/certbot && sudo chmod 755 /var/www/certbot
# 2) Enable this site's port-80 block, then:
#    sudo certbot certonly --webroot -w /var/www/certbot -d hogsplitter.pro -d www.hogsplitter.pro
# 3) Add the 443 block (or reload if already present). Renewals: snap certbot renew (same as other webroot certs).
#    ACME must be served on BOTH :80 and :443 — the CA may follow your HTTP→HTTPS redirect and read the token over HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name hogsplitter.pro www.hogsplitter.pro;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hogsplitter.pro www.hogsplitter.pro;

    root /srv/hogsplitter.pro/html;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    ssl_certificate /etc/letsencrypt/live/hogsplitter.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hogsplitter.pro/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/hogsplitter.pro/chain.pem;

    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    location ~* \.(?:css|js|mjs|svg|jpg|jpeg|gif|png|webp|avif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
